name: CI Pipeline

# Kapan pipeline ini dijalankan
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Jobs yang akan dijalankan
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Strategy untuk multiple Node.js versions (opsional)
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    # 1. Checkout kode dari repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # 3. Install dependencies
    - name: Install dependencies
      run: npm ci

    # 4. Run linter
    - name: Run linter
      run: npm run lint

    # 5. Run tests
    - name: Run tests
      run: npm test

    # 6. Build project
    - name: Build project
      run: npm run build

    # 7. Upload test coverage (opsional)
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: success()